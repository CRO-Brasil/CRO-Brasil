  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ens\n   Brand core (from brand spec):\n     Purple  #7904CD   Pink #F72A68\n     Orange  #FF4012   Dark Purple (ink) #0E0818\n   ============================================================ */\n\n:root {\n  /* ---- Brand core ---- */\n  --purple: #7904CD;\n  --pink: #F72A68;\n  --orange: #FF4012;\n  --ink: #0E0818;\n\n  /* ---- Purple scale ---- */\n  --purple-700: #44037A;\n  --purple-600: #5C039E;\n  --purple-500: #7904CD; /* base */\n  --purple-400: #9A3BE0;\n  --purple-300: #BC72EC;\n  --purple-200: #DBB0F5;\n  --purple-100: #F1DEFB;\n  --purple-50:  #FAF2FE;\n\n  /* ---- Pink scale ---- */\n  --pink-700: #9E0A41;\n  --pink-600: #C71250;\n  --pink-500: #F72A68; /* base */\n  --pink-400: #FA5C8A;\n  --pink-300: #FC8FAE;\n  --pink-200: #FDC0D1;\n  --pink-100: #FEE5EC;\n  --pink-50:  #FFF2F6;\n\n  /* ---- Orange scale ---- */\n  --orange-700: #A32200;\n  --orange-600: #CC2A00;\n  --orange-500: #FF4012; /* base */\n  --orange-400: #FF6B45;\n  --orange-300: #FF9678;\n  --orange-200: #FFC0AE;\n  --orange-100: #FFE5DC;\n  --orange-50:  #FFF3EE;\n\n  /* ---- Neutral / ink scale (violet-tinted, anchored on brand dark purple) ---- */\n  --ink-950: #0E0818; /* base — brand dark purple */\n  --ink-900: #150D24;\n  --ink-800: #1E1431;\n  --ink-700: #2C2142;\n  --ink-600: #3F3357;\n  --ink-500: #564B6E;\n  --ink-400: #756B8C;\n  --ink-300: #9C93AF;\n  --ink-200: #C7C1D3;\n  --ink-150: #DAD5E2;\n  --ink-100: #E9E5EF;\n  --ink-75:  #F2EFF6;\n  --ink-50:  #F8F6FB;\n  --white: #FFFFFF;\n\n  /* ---- Semantic state colors ---- */\n  --success: #12A150;\n  --success-bg: #E5F6EC;\n  --warning: #F5A524;\n  --warning-bg: #FDF3E0;\n  --danger: #E11D48;\n  --danger-bg: #FDE7EC;\n  --info: var(--purple-500);\n  --info-bg: var(--purple-50);\n\n  /* ============================================================\n     Gradients — the signature CRO Brasil device\n     ============================================================ */\n  --gradient-01: linear-gradient(90deg, #7904CD 0%, #F72A68 100%); /* @kind color */   /* purple → pink */\n  --gradient-02: linear-gradient(90deg, #F72A68 0%, #FF4012 100%); /* @kind color */   /* pink → orange */\n  --gradient-brand: linear-gradient(90deg, #7904CD 0%, #F72A68 52%, #FF4012 100%); /* @kind color */\n  --gradient-brand-diag: linear-gradient(120deg, #7904CD 0%, #F72A68 52%, #FF4012 100%); /* @kind color */\n  --gradient-brand-radial: radial-gradient(120% 140% at 0% 50%, #7904CD 0%, #F72A68 50%, #FF4012 100%); /* @kind color */\n\n  /* ============================================================\n     Semantic aliases (use these in product UI)\n     ============================================================ */\n  --bg: var(--white);\n  --bg-subtle: var(--ink-50);\n  --bg-inverse: var(--ink-950);\n  --surface: var(--white);\n  --surface-subtle: var(--ink-50);\n  --surface-raised: var(--white);\n  --surface-inverse: var(--ink-900);\n\n  --text-primary: var(--ink-950);\n  --text-secondary: var(--ink-500);\n  --text-muted: var(--ink-400);\n  --text-inverse: var(--white);\n  --text-on-brand: var(--white);\n  --text-link: var(--purple-500);\n\n  --border: var(--ink-100);\n  --border-strong: var(--ink-200);\n  --border-focus: var(--purple-400);\n\n  --accent: var(--purple-500);\n  --accent-hover: var(--purple-600);\n  --accent-pressed: var(--purple-700);\n\n  --focus-ring: color-mix(in srgb, var(--purple-500) 45%, transparent);\n}\n\n/* ============================================================\n   Dark theme — apply data-theme=\"dark\" on a container or :root\n   ============================================================ */\n[data-theme=\"dark\"] {\n  --bg: var(--ink-950);\n  --bg-subtle: var(--ink-900);\n  --bg-inverse: var(--white);\n  --surface: var(--ink-900);\n  --surface-subtle: var(--ink-800);\n  --surface-raised: var(--ink-800);\n  --surface-inverse: var(--white);\n\n  --text-primary: #F6F4FA;\n  --text-secondary: var(--ink-300);\n  --text-muted: var(--ink-400);\n  --text-inverse: var(--ink-950);\n  --text-link: var(--purple-300);\n\n  --border: var(--ink-700);\n  --border-strong: var(--ink-600);\n  --border-focus: var(--purple-400);\n\n  --accent: var(--purple-400);\n  --accent-hover: var(--purple-300);\n  --accent-pressed: var(--purple-200);\n}\n\n/* ============================================================\n   CRO Brasil — Typography tokens\n   One family does everything: Plus Jakarta Sans.\n   Display uses heavy weights + tight tracking; body stays\n   regular/medium with comfortable line-height.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"Plus Jakarta Sans\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-display: var(--font-sans);\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, \"Liberation Mono\", monospace;\n\n  /* ---- Weights ---- */\n  --weight-extralight: 200;\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-extrabold: 800;\n\n  /* ---- Type scale (px-based, 1.250 major-third-ish, hand-tuned) ---- */\n  --text-2xs: 0.6875rem;  /* 11px */\n  --text-xs:  0.75rem;    /* 12px */\n  --text-sm:  0.875rem;   /* 14px */\n  --text-base: 1rem;      /* 16px */\n  --text-md:  1.125rem;   /* 18px */\n  --text-lg:  1.375rem;   /* 22px */\n  --text-xl:  1.75rem;    /* 28px */\n  --text-2xl: 2.25rem;    /* 36px */\n  --text-3xl: 2.875rem;   /* 46px */\n  --text-4xl: 3.75rem;    /* 60px */\n  --text-5xl: 4.75rem;    /* 76px */\n  --text-6xl: 6rem;       /* 96px */\n\n  /* ---- Line heights ---- */\n  --leading-none: 1;\n  --leading-tight: 1.1;\n  --leading-snug: 1.25;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tighter: -0.04em;\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide: 0.02em;\n  --tracking-wider: 0.08em;\n  --tracking-caps: 0.14em;  /* for all-caps eyebrows/labels */\n\n  /* ---- Semantic role tokens ---- */\n  --display-weight: var(--weight-extrabold);\n  --display-tracking: var(--tracking-tight);\n  --display-leading: var(--leading-tight);\n\n  --heading-weight: var(--weight-bold);\n  --heading-tracking: var(--tracking-tight);\n\n  --body-weight: var(--weight-regular);\n  --body-leading: var(--leading-relaxed);\n\n  --eyebrow-weight: var(--weight-bold);\n  --eyebrow-tracking: var(--tracking-caps);\n  --eyebrow-size: var(--text-xs);\n}\n\n/* ============================================================\n   CRO Brasil — Spacing & layout tokens\n   4px base grid.\n   ============================================================ */\n\n:root {\n  --space-0: 0;\n  --space-px: 1px;\n  --space-0-5: 0.125rem; /* 2 */\n  --space-1: 0.25rem;    /* 4 */\n  --space-1-5: 0.375rem; /* 6 */\n  --space-2: 0.5rem;     /* 8 */\n  --space-3: 0.75rem;    /* 12 */\n  --space-4: 1rem;       /* 16 */\n  --space-5: 1.25rem;    /* 20 */\n  --space-6: 1.5rem;     /* 24 */\n  --space-8: 2rem;       /* 32 */\n  --space-10: 2.5rem;    /* 40 */\n  --space-12: 3rem;      /* 48 */\n  --space-16: 4rem;      /* 64 */\n  --space-20: 5rem;      /* 80 */\n  --space-24: 6rem;      /* 96 */\n  --space-32: 8rem;      /* 128 */\n\n  /* ---- Layout ---- */\n  --container-sm: 640px;\n  --container-md: 820px;\n  --container-lg: 1080px;\n  --container-xl: 1280px;\n  --container-2xl: 1440px;\n  --gutter: var(--space-6);\n  --section-y: var(--space-24);\n}\n\n/* ============================================================\n   CRO Brasil — Radii, shadows, motion, blur, z-index\n   The brand leans on the pill (fully-rounded) shape — its logo\n   \"O\" is a pill. Buttons and chips echo that with full rounding;\n   cards use a generous but not pill radius.\n   ============================================================ */\n\n:root {\n  /* ---- Radii ---- */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-2xl: 32px;\n  --radius-pill: 999px;   /* the signature CRO pill */\n  --radius-circle: 50%;\n\n  /* ---- Shadows — cool violet-tinted, never pure black ---- */\n  --shadow-xs: 0 1px 2px rgba(14, 8, 24, 0.06);\n  --shadow-sm: 0 1px 3px rgba(14, 8, 24, 0.08), 0 1px 2px rgba(14, 8, 24, 0.04);\n  --shadow-md: 0 4px 12px rgba(14, 8, 24, 0.08), 0 2px 4px rgba(14, 8, 24, 0.05);\n  --shadow-lg: 0 12px 28px rgba(14, 8, 24, 0.12), 0 4px 8px rgba(14, 8, 24, 0.06);\n  --shadow-xl: 0 24px 56px rgba(14, 8, 24, 0.16), 0 8px 16px rgba(14, 8, 24, 0.08);\n\n  /* Brand glow — for hero CTAs / focal elements on dark */\n  --glow-purple: 0 8px 32px rgba(121, 4, 205, 0.35);\n  --glow-pink: 0 8px 32px rgba(247, 42, 104, 0.32);\n  --glow-orange: 0 8px 32px rgba(255, 64, 18, 0.30);\n\n  /* ---- Blur ---- */\n  --blur-sm: 6px;  /* @kind other */\n  --blur-md: 14px; /* @kind other */\n  --blur-lg: 28px; /* @kind other */\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);     /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 360ms; /* @kind other */\n\n  /* ---- Z-index ---- */\n  --z-base: 0;       /* @kind other */\n  --z-raised: 10;    /* @kind other */\n  --z-sticky: 100;   /* @kind other */\n  --z-overlay: 1000; /* @kind other */\n  --z-modal: 1100;   /* @kind other */\n  --z-toast: 1200;   /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  :root { --page-w: 1080px; }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  body {\n    font-family: var(--font-sans);\n    background: #06040d;\n    color: var(--ink-950);\n    -webkit-font-smoothing: antialiased;\n    display: flex; justify-content: center;\n  }\n  .ig { width: var(--page-w); position: relative; overflow: hidden; }\n\n  /* ---------- responsive: scale the fixed 1080px artwork to fit narrow screens ---------- */\n  @media (max-width: 1080px) {\n    html, body { width: 100%; overflow-x: hidden; }\n    body { display: block; }\n    .ig { transform-origin: top left; }\n  }\n\n  /* ---------- bands ---------- */\n  .band { position: relative; padding: 88px 84px; }\n  .band.paper { background: #F6F2EB; }\n  .band.dark { background: #0E0818; color: #fff; }\n  .band.dark::before {\n    content: \"\"; position: absolute; inset: 0; pointer-events: none;\n    background:\n      radial-gradient(60% 44% at 6% 4%, rgba(121,4,205,0.40), transparent 60%),\n      radial-gradient(54% 42% at 98% 96%, rgba(247,42,104,0.22), transparent 58%);\n  }\n  .band > * { position: relative; z-index: 1; }\n\n  /* ---------- section header ---------- */\n  .shead { display: flex; align-items: flex-start; gap: 22px; margin-bottom: 44px; }\n  .snum {\n    flex: none; display: inline-flex; align-items: center; justify-content: center;\n    min-width: 64px; height: 64px; padding: 0 8px; border-radius: var(--radius-pill);\n    background: var(--gradient-brand); box-shadow: var(--glow-purple);\n    font-size: 26px; font-weight: 800; color: #fff; letter-spacing: 0.02em;\n  }\n  .shead .meta { padding-top: 2px; }\n  .eyebrow {\n    font-size: 14px; font-weight: 700; letter-spacing: var(--tracking-caps);\n    text-transform: uppercase; margin: 0 0 8px;\n  }\n  .paper .eyebrow { color: var(--purple-600); }\n  .dark .eyebrow { color: var(--purple-300); }\n  .stitle {\n    font-size: 42px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.04; margin: 0;\n    max-width: 760px; text-wrap: balance;\n  }\n  .dark .stitle { color: #fff; }\n  .grad { background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .grad2 { background: var(--gradient-02); -webkit-background-clip: text; background-clip: text; color: transparent; }\n\n  /* ---------- generic card grid ---------- */\n  .grid { display: grid; gap: 20px; }\n  .g2 { grid-template-columns: 1fr 1fr; }\n  .card {\n    background: #fff; border: 1.5px solid var(--ink-100); border-radius: var(--radius-xl);\n    box-shadow: var(--shadow-sm); padding: 26px 26px 28px;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .card .top { display: flex; align-items: center; gap: 14px; }\n  .ico {\n    flex: none; width: 52px; height: 52px; border-radius: var(--radius-lg);\n    display: flex; align-items: center; justify-content: center;\n    background: linear-gradient(135deg, var(--purple-50), var(--pink-50));\n    border: 1.5px solid var(--ink-100);\n  }\n  .ico svg, .ico i { width: 26px; height: 26px; }\n  .card .ttl { font-size: 23px; font-weight: 800; letter-spacing: -0.01em; color: var(--ink-950); line-height: 1.12; }\n  .card .desc { font-size: 18px; line-height: 1.5; color: var(--ink-600); margin: 0; }\n  .tag {\n    align-self: flex-start; font-size: 13px; font-weight: 700; letter-spacing: 0.04em;\n    text-transform: uppercase; color: var(--purple-600);\n    background: var(--purple-50); border: 1px solid var(--purple-100);\n    padding: 5px 12px; border-radius: var(--radius-pill);\n  }\n\n  /* lucide stroke color helper */\n  .ico--purple svg, .ico--purple i { color: var(--purple-600); }\n  .ico--pink svg, .ico--pink i { color: var(--pink-600); }\n  .ico--orange svg, .ico--orange i { color: var(--orange-600); }\n\n  /* ---------- compact list (visual practices) ---------- */\n  .rows { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n  .row {\n    display: flex; align-items: center; gap: 16px; padding: 18px 22px;\n    background: #fff; border: 1.5px solid var(--ink-100); border-radius: var(--radius-lg);\n    box-shadow: var(--shadow-xs);\n  }\n  .row .ico { width: 44px; height: 44px; border-radius: var(--radius-md); }\n  .row .ico svg, .row .ico i { width: 22px; height: 22px; }\n  .row .rttl { font-size: 21px; font-weight: 700; color: var(--ink-900); letter-spacing: -0.01em; line-height: 1.1; }\n  .row .rsub { font-size: 15px; color: var(--ink-500); margin-top: 2px; line-height: 1.35; }\n\n  /* ---------- error cards (dark) ---------- */\n  .errcard {\n    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.12);\n    border-radius: var(--radius-xl); padding: 24px;\n    display: flex; align-items: flex-start; gap: 16px;\n  }\n  .errcard .x {\n    flex: none; width: 48px; height: 48px; border-radius: var(--radius-md);\n    background: var(--gradient-02); display: flex; align-items: center; justify-content: center;\n  }\n  .errcard .x svg, .errcard .x i { width: 26px; height: 26px; color: #fff; }\n  .errcard .etxt .ettl { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.12; }\n  .errcard .etxt .esub { font-size: 16px; color: rgba(255,255,255,0.62); margin-top: 5px; line-height: 1.4; }\n\n  /* ---------- convert chips (dark) ---------- */\n  .convgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .conv {\n    display: flex; align-items: center; gap: 18px; padding: 22px 24px;\n    border-radius: var(--radius-xl); position: relative;\n    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);\n  }\n  .conv .ring {\n    flex: none; width: 56px; height: 56px; border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    border: 2px solid transparent;\n    background: linear-gradient(#0E0818,#0E0818) padding-box, var(--gradient-brand) border-box;\n  }\n  .conv .ring svg, .conv .ring i { width: 27px; height: 27px; color: var(--pink-400); }\n  .conv .cttl { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.1; }\n  .conv .csub { font-size: 16px; color: rgba(255,255,255,0.6); margin-top: 4px; line-height: 1.38; }\n\n  /* ---------- benchmark wireframes ---------- */\n  .benchgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; }\n  .bench {\n    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);\n    border-radius: var(--radius-xl); padding: 20px; display: flex; flex-direction: column; gap: 16px;\n  }\n  .wf {\n    aspect-ratio: 4/3; border-radius: var(--radius-md); overflow: hidden;\n    background: #fff; border: 1px solid rgba(255,255,255,0.14); padding: 12px;\n    display: flex; flex-direction: column; gap: 8px;\n  }\n  .bench .blabel { font-size: 13px; font-weight: 700; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--purple-300); }\n  .bench .bttl { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.12; }\n  .bench .bsub { font-size: 15px; color: rgba(255,255,255,0.58); line-height: 1.4; margin-top: 2px; }\n\n  /* wireframe primitives */\n  .wf .ln { height: 6px; border-radius: 3px; background: var(--ink-150); }\n  .wf .ln.dark { background: var(--ink-300); }\n  .wf .ln.w70 { width: 70%; } .wf .ln.w50 { width: 50%; } .wf .ln.w40 { width: 40%; } .wf .ln.w85 { width: 85%; }\n  .wf .blk { background: var(--ink-100); border-radius: 6px; }\n  .wf .gradblk { background: var(--gradient-brand); border-radius: 6px; }\n  .wf .pill { height: 14px; border-radius: 7px; background: var(--gradient-02); }\n  .wf .row2 { display: flex; gap: 8px; }\n  .wf .col { display: flex; flex-direction: column; gap: 6px; flex: 1; }\n  .wf .star { color: var(--orange-500); font-size: 13px; letter-spacing: 1px; line-height: 1; }\n  .wf .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink-150); }\n\n  /* ---------- footer ---------- */\n  .footer { background: #0E0818; padding: 76px 84px; position: relative; overflow: hidden; }\n  .footer::before { content: \"\"; position: absolute; inset: 0;\n    background: radial-gradient(70% 120% at 50% 0%, rgba(121,4,205,0.5), transparent 60%); }\n  .footer > * { position: relative; z-index: 1; }\n  .footnote { font-size: 24px; color: rgba(255,255,255,0.72); line-height: 1.5; max-width: 640px; }\n  .urlpill {\n    displ 255,0.86); padding: 10px 18px; border-radius: var(--radius-pill);\n    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);\n  }\n  .hero .lgi b { font-weight: 800; }\n  .hero .lgi .d { width: 9px; height: 9px; border-radius: 50%; background: var(--gradient-brand); }\n\n  .divider { height: 2px; border-radius: 2px; background: var(--gradient-brand); opacity: 0.85; margin: 40px 0; position: relative; }\n  .divider::after { content: \"\"; position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 11px; height: 11px; border-radius: 50%; background: #fff; box-shadow: 0 0 12px 2px var(--pink-500); }\n\n  .secnote { font-size: 19px; line-height: 1.55; color: var(--ink-500); margin: -28px 0 36px; max-width: 720px; }\n  .dark .secnote { color: rgba(255,255,255,0.6); }\n\n  /* ---------- anatomy (annotated wireframe) ---------- */\n  .anat-wrap { position: relative; width: 100%; height: 1064px; margin-top: 4px; }\n  .anat-page { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 392px;\n    background: #fff; border: 1.5px solid var(--ink-100); border-radius: 16px; box-shadow: var(--shadow-lg); overflow: hidden; }\n  .imgicon { color: var(--ink-300); display: flex; }\n  .imgicon svg, .imgicon i { width: 38px; height: 38px; }\n  .wln { height: 8px; border-radius: 4px; background: var(--ink-200); }\n\n  .anat-page .ahead { height: 64px; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ink-75); }\n  .anat-page .alogo { width: 64px; height: 16px; border-radius: 5px; background: var(--ink-200); }\n  .anat-page .anav { display: flex; gap: 8px; }\n  .anat-page .anav span { width: 26px; height: 7px; border-radius: 4px; background: var(--ink-150); }\n\n  .ahero { height: 250px; display: flex; }\n  .ahero .hl { flex: 1; background: var(--ink-75); display: flex; align-items: center; justify-content: center; }\n  .ahero .hr { flex: 1; background: var(--ink-150); padding: 30px 26px; display: flex; flex-direction: column; justify-content: center; gap: 11px; }\n  .ahero .hr .wln { background: #fff; }\n  .acta { height: 22px; width: 98px; border-radius: 6px; background: var(--gradient-brand); margin-top: 6px; }\n  .ahero .hr .acta { background: #fff; }\n\n  .asupp { height: 200px; padding: 26px; display: flex; gap: 22px; align-items: center; }\n  .asupp .si { flex: 1; align-self: stretch; background: var(--ink-75); border-radius: 8px; display: flex; align-items: center; justify-content: center; }\n  .asupp .sb { flex: 1; display: flex; flex-direction: column; gap: 9px; }\n  .asupp .sb .h { height: 10px; width: 62%; border-radius: 5px; background: var(--ink-300); margin-bottom: 5px; }\n  .asupp .sb .wln { background: var(--ink-150); }\n\n  .aproof { height: 250px; padding: 26px; display: flex; flex-direction: column; gap: 16px; }\n  .aproof .ph { height: 9px; width: 48%; border-radius: 5px; background: var(--ink-200); align-self: center; }\n  .aproof .cards { display: flex; gap: 14px; flex: 1; }\n  .aproof .pc { flex: 1; display: flex; flex-direction: column; gap: 8px; }\n  .aproof .pc .pi { flex: 1; background: var(--ink-75); border-radius: 8px; display: flex; align-items: center; justify-content: center; }\n  .aproof .pc .imgicon svg, .aproof .pc .imgicon i { width: 28px; height: 28px; }\n  .aproof .pc .wln { background: var(--ink-150); }\n\n  .aaddl { height: 200px; background: var(--ink-150); padding: 28px 26px; display: flex; flex-direction: column; gap: 16px; }\n  .aaddl .cols { display: flex; gap: 14px; }\n  .aaddl .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }\n  .aaddl .col .wln { height: 6px; background: #fff; opacity: 0.85; }\n  .aaddl .addcta { align-self: center; width: 120px; height: 24px; border-radius: 6px; background: #fff; margin-top: auto; }\n\n  .afoot { height: 56px; background: var(--ink-800); display: flex; align-items: center; justify-content: space-between; padding: 0 22px; }\n  .afoot .fn { width: 118px; height: 9px; border-radius: 5px; background: rgba(255,255,255,0.32); }\n  .afoot .fd { display: flex; gap: 8px; }\n  .afoot .fd span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.3); }\n\n  /* callouts */\n  .cal { position: absolute; display: flex; align-items: center; width: 250px; }\n  .cal.l { right: calc(50% + 196px); justify-content: flex-end; }\n  .cal.r { left: calc(50% + 196px); justify-content: flex-start; }\n  .cal .lab { max-width: 174px; }\n  .cal.l .lab { text-align: right; }\n  .cal .lab .t { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; color: var(--ink-950); line-height: 1.1; }\n  .cal .lab .s { font-size: 12.5px; line-height: 1.32; color: var(--ink-500); margin-top: 3px; }\n  .con { position: relative; height: 1.5px; background: var(--ink-300); width: 54px; flex: none; }\n  .cal.l .con { margin-left: 14px; }\n  .cal.r .con { margin-right: 14px; }\n  .con::after { content: \"\"; position: absolute; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; background: var(--gradient-brand); box-shadow: 0 0 0 3px rgba(247,42,104,0.12); }\n  .cal.l .con::after { right: -4px; }\n  .cal.r .con::after { left: -4px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<div class=\"ig\">\n\n  <!-- ============ HERO ============ -->\n  <header class=\"hero\">\n    <div class=\"topline\">\n      <span class=\"kchip\"><i data-lucide=\"briefcase\"><\u002Fi> Guia CRO Brasil · B2B<\u002Fspan>\n      <img class=\"logo\" src=\"ee0f9c1d-2d32-47c2-925e-ba0823ca35fc\" alt=\"CRO Brasil\">\n    <\u002Fdiv>\n    <h1>Boas práticas para <span class=\"grad\">landing pages<\u002Fspan> B2B<\u002Fh1>\n    <p class=\"sub\">Um guia visual e consultivo com os elementos que tornam uma página B2B mais eficaz para gerar <b>leads qualificados<\u002Fb>, com mais <b>clareza<\u002Fb>, <b>credibilidade<\u002Fb> e <b>conversão<\u002Fb>.<\u002Fp>\n    <div class=\"legend\">\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> Anatomia<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> O que ter<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> Conteúdo<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> Visual<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> Erros a evitar<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> O que converte<\u002Fspan>\n      <span class=\"lgi\"><span class=\"d\"><\u002Fspan> Benchmark<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ 01 · ANATOMIA ============ -->\n  <section class=\"band paper\">\n    <div class=\"shead\">\n      <span class=\"snum\">01<\u002Fspan>\n      <div class=\"meta\">\n        <p class=\"eyebrow\">Visão geral<\u002Fp>\n        <h2 class=\"stitle\">A anatomia de uma <span class=\"grad\">landing page que converte<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"secnote\">Onde cada elemento vive numa página B2B de geração de leads, do topo ao rodapé. Use como mapa antes de montar a sua.<\u002Fp>\n\n    <div class=\"anat-wrap\">\n      <!-- wireframe -->\n      <div class=\"anat-page\">\n        <div class=\"ahead\">\n          <span class=\"alogo\"><\u002Fspan>\n          <span class=\"anav\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ahero\">\n          <div class=\"hl\"><span class=\"imgicon\"><i data-lucide=\"layout-dashboard\"><\u002Fi><\u002Fspan><\u002Fdiv>\n          <div class=\"hr\">\n            <div class=\"wln\" style=\"width:78%;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:60%;height:6px;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:90%;height:6px;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:72%;height:6px;\"><\u002Fdiv>\n            <div class=\"acta\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"asupp\">\n          <div class=\"si\"><span class=\"imgicon\"><i data-lucide=\"git-branch\"><\u002Fi><\u002Fspan><\u002Fdiv>\n          <div class=\"sb\">\n            <div class=\"h\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:100%;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:92%;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:80%;\"><\u002Fdiv>\n            <div class=\"wln\" style=\"width:88%;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"aproof\">\n          <div class=\"ph\"><\u002Fdiv>\n          <div class=\"cards\">\n            <div class=\"pc\"><div class=\"pi\"><span class=\"imgicon\"><i data-lucide=\"building-2\"><\u002Fi><\u002Fspan><\u002Fdiv><div class=\"wln\" style=\"width:90%;\"><\u002Fdiv><div class=\"wln\" style=\"width:60%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"pc\"><div class=\"pi\"><span class=\"imgicon\"><i data-lucide=\"trending-up\"><\u002Fi><\u002Fspan><\u002Fdiv><div class=\"wln\" style=\"width:90%;\"><\u002Fdiv><div class=\"wln\" style=\"width:60%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"pc\"><div class=\"pi\"><span class=\"imgicon\"><i data-lucide=\"quote\"><\u002Fi><\u002Fspan><\u002Fdiv><div class=\"wln\" style=\"width:90%;\"><\u002Fdiv><div class=\"wln\" style=\"width:60%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"aaddl\">\n          <div class=\"cols\">\n            <div class=\"col\"><div class=\"wln\" style=\"width:90%;\"><\u002Fdiv><div class=\"wln\" style=\"width:70%;\"><\u002Fdiv><div class=\"wln\" style=\"width:80%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"col\"><div class=\"wln\" style=\"width:80%;\"><\u002Fdiv><div class=\"wln\" style=\"width:95%;\"><\u002Fdiv><div class=\"wln\" style=\"width:65%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"col\"><div class=\"wln\" style=\"width:85%;\"><\u002Fdiv><div class=\"wln\" style=\"width:70%;\"><\u002Fdiv><div class=\"wln\" style=\"width:88%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"col\"><div class=\"wln\" style=\"width:78%;\"><\u002Fdiv><div class=\"wln\" style=\"width:90%;\"><\u002Fdiv><div class=\"wln\" style=\"width:62%;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"addcta\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"afoot\">\n          <span class=\"fn\"><\u002Fspan>\n          <span class=\"fd\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- callouts: left -->\n      <div class=\"cal l\" style=\"top:32px;\"><div class=\"lab\"><div class=\"t\">Logo<\u002Fdiv><div class=\"s\">No topo: identifica a marca e dá contexto.<\u002Fdiv><\u002Fdiv><div class=\"con\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal l\" style=\"top:190px;\"><div class=\"lab\"><div class=\"t\">Visual do produto<\u002Fdiv><div class=\"s\">Dashboard, demo ou diagrama da solução.<\u002Fdiv><\u002Fdiv><div class=\"con\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal l\" style=\"top:414px;\"><div class=\"lab\"><div class=\"t\">Problema → solução<\u002Fdiv><div class=\"s\">Explica a dor e como a oferta resolve.<\u002Fdiv><\u002Fdiv><div class=\"con\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal l\" style=\"top:850px;\"><div class=\"lab\"><div class=\"t\">Cases &amp; autoridade<\u002Fdiv><div class=\"s\">Resultados, metodologia e provas de negócio.<\u002Fdiv><\u002Fdiv><div class=\"con\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal l\" style=\"top:992px;\"><div class=\"lab\"><div class=\"t\">Rodapé<\u002Fdiv><div class=\"s\">Contato, segurança e links institucionais.<\u002Fdiv><\u002Fdiv><div class=\"con\"><\u002Fdiv><\u002Fdiv>\n\n      <!-- callouts: right -->\n      <div class=\"cal r\" style=\"top:104px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">Headline forte<\u002Fdiv><div class=\"s\">A promessa de negócio, clara e direta.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal r\" style=\"top:196px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">Proposta de valor<\u002Fdiv><div class=\"s\">Para quem é e qual o impacto gerado.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal r\" style=\"top:256px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">CTA apropriado<\u002Fdiv><div class=\"s\">“Agendar conversa” ou “Ver demonstração”.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal r\" style=\"top:414px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">Benefícios de negócio<\u002Fdiv><div class=\"s\">Funcionalidade conectada ao resultado.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal r\" style=\"top:640px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">Logos &amp; métricas<\u002Fdiv><div class=\"s\">Clientes, números e provas de autoridade.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"cal r\" style=\"top:928px;\"><div class=\"con\"><\u002Fdiv><div class=\"lab\"><div class=\"t\">CTA final<\u002Fdiv><div class=\"s\">Deixe claro o próximo passo.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 · PRECISA TER ============ -->\n  <section class=\"band paper\">\n    <div class=\"shead\">\n      <span class=\"snum\">02<\u002Fspan>\n      <div class=\"meta\">\n        <p class=\"eyebrow\">Os fundamentos<\u002Fp>\n        <h2 class=\"stitle\">O que uma landing page B2B <span class=\"grad\">precisa ter<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid g2\">\n      <div class=\"card\">\n        <div class=\"top\"><span class=\"ico ico--purple\"><i data-lucide=\"badge-check\"><\u002Fi><\u002Fspan><span class=\"ttl\">Proposta de valor clara<\u002Fspan><\u002Fdiv>\n        <p class=\"desc\">Em uma frase: o que você entrega, para quem e qual o impacto.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"top\"><
